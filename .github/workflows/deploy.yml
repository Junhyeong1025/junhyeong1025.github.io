name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-base \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-latex-extra \
            lmodern

      - name: Compile LaTeX CV
        run: |
          cd cv
          pdflatex -interaction=nonstopmode junhyeong_lee_cv.tex 2>&1 | tail -30
          if [ -f junhyeong_lee_cv.pdf ]; then
            echo "✅ PDF generated ($(du -h junhyeong_lee_cv.pdf | cut -f1))"
            cp junhyeong_lee_cv.pdf ../CV_JunhyeongLee_long_version.pdf
          else
            echo "⚠️  PDF not generated — using existing PDF"
          fi
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
