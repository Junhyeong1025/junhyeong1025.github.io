name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/junhyeong_lee_cv.tex
          work_in_root_file_dir: true
        continue-on-error: true

      - name: Use compiled PDF
        run: |
          if [ -f cv/junhyeong_lee_cv.pdf ]; then
            cp cv/junhyeong_lee_cv.pdf CV_JunhyeongLee_long_version.pdf
            echo "✅ LaTeX CV compiled successfully"
          else
            echo "⚠️  LaTeX compilation failed — using existing PDF"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
